<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GCM-Patna</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            box-sizing: border-box;
            /* Ensures padding and borders are included in the width */
        }

        body {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }


        .MainContainer {
            width: 100%;
            height: 100%;
            /* Ensures the width spans the entire viewport */
            max-width: 100%;
            /* Prevents overflow */
            margin: 0;
            /* Removes any default margins */
            padding: 0;
            /* Removes any default padding */
            box-sizing: border-box;
            /* Ensures padding and borders are included in the width */
            align-self: center;
            align-content: center;
            justify-content: center;
            font-family: "Raleway", sans-serif;
            font-optical-sizing: auto;
            font-weight: 700;
            font-size: large;
            font-style: normal;
        }
    </style>
</head>

<body>
    <div id="root" class="MainContainer">
    </div>
    <!-- React will mount here -->
</body>

</html>
